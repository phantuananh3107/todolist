spring.application.name=demo

# Server Port
server.port=${PORT:9090}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/todolist}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:huyhoang11}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging Settings
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationDeltaLoggingListener=OFF


# JWT Configuration
jwt.access.secret=${JWT_ACCESS_SECRET:K9fP2mR7XQe4Z8aBvC1N6YdHjWkL5S0U}
jwt.refresh.secret=${JWT_REFRESH_SECRET:R3tX7mP9QeZ2aBvC8N1YdHjWkL4S6U0F}
jwt.expires.in=900000
jwt.refresh.expires.in=604800000

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo-0125

# FCM Push Notification
fcm.enabled=${FCM_ENABLED:true}
fcm.service-account-file=${FCM_SERVICE_ACCOUNT_FILE:}
fcm.service-account-json=${FCM_SERVICE_ACCOUNT_JSON:}