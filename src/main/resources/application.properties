spring.application.name=demo

# Server Port
server.port=${PORT:8080}

# Database — ${TEN_BIEN:gia_tri_mac_dinh} : có thể override bằng biến môi trường
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging Settings
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationDeltaLoggingListener=OFF

# JWT — không dùng ${chuoi_bi_mat} (Spring hiểu đó là TÊN biến). Dùng tên biến rõ ràng + default local:
jwt.access.secret=${JWT_ACCESS_SECRET}
jwt.refresh.secret=${JWT_REFRESH_SECRET}
jwt.expires.in=900000
jwt.refresh.expires.in=604800000

